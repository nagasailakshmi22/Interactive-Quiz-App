<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interactive Quiz App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { background: #16213e; border-radius: 16px; padding: 40px; max-width: 650px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    h1 { text-align: center; color: #e94560; margin-bottom: 8px; font-size: 2rem; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; font-size: 0.95rem; }
    input { width: 100%; padding: 12px 16px; border-radius: 8px; border: 2px solid #0f3460; background: #0f3460; color: #fff; font-size: 1rem; margin-bottom: 16px; outline: none; }
    input:focus { border-color: #e94560; }
    button { background: #e94560; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; transition: 0.2s; }
    button:hover { background: #c73652; }
    .question-card { margin-bottom: 24px; }
    .question-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 14px; color: #fff; }
    .question-num { color: #e94560; font-size: 0.85rem; margin-bottom: 6px; }
    .options { display: grid; gap: 10px; }
    .option { background: #0f3460; border: 2px solid #0f3460; border-radius: 8px; padding: 12px 16px; cursor: pointer; transition: 0.2s; text-align: left; color: #eee; font-size: 0.95rem; }
    .option:hover { border-color: #e94560; }
    .option.selected { border-color: #e94560; background: #1a1a4e; }
    .progress { background: #0f3460; border-radius: 20px; height: 8px; margin-bottom: 30px; }
    .progress-bar { background: #e94560; height: 8px; border-radius: 20px; transition: width 0.3s; }
    .result { text-align: center; }
    .score-circle { width: 140px; height: 140px; border-radius: 50%; border: 6px solid #e94560; margin: 20px auto; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .score-num { font-size: 2.5rem; font-weight: bold; color: #e94560; }
    .score-label { font-size: 0.85rem; color: #aaa; }
    .message { font-size: 1.2rem; margin: 16px 0; color: #fff; }
    .leaderboard { margin-top: 30px; }
    .leaderboard h3 { color: #e94560; margin-bottom: 12px; }
    .lb-item { display: flex; justify-content: space-between; padding: 10px 14px; background: #0f3460; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; }
    .hidden { display: none; }
    .nav { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; }
    .nav button { width: auto; padding: 10px 24px; }
    .btn-outline { background: transparent; border: 2px solid #e94560; color: #e94560; }
    .btn-outline:hover { background: #e94560; color: white; }
  </style>
</head>
<body>
<div class="container">

  <!-- Start Screen -->
  <div id="start-screen">
    <h1>🧠 Quiz App</h1>
    <p class="subtitle">Test your tech knowledge!</p>
    <input type="text" id="player-name" placeholder="Enter your name" />
    <button onclick="startQuiz()">Start Quiz</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz-screen" class="hidden">
    <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
    <div id="question-container"></div>
    <div class="nav">
      <button class="btn-outline" onclick="prevQuestion()">← Prev</button>
      <button onclick="nextQuestion()">Next →</button>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="hidden result">
    <h1>🎉 Result</h1>
    <div class="score-circle">
      <div class="score-num" id="final-score"></div>
      <div class="score-label">correct</div>
    </div>
    <div class="message" id="result-message"></div>
    <button onclick="restartQuiz()">Play Again</button>
    <div class="leaderboard">
      <h3>🏆 Leaderboard</h3>
      <div id="leaderboard-list"></div>
    </div>
  </div>

</div>

<script>
  let questions = [];
  let currentIndex = 0;
  let answers = {};
  let playerName = '';

  async function startQuiz() {
    playerName = document.getElementById('player-name').value.trim();
    if (!playerName) { alert('Please enter your name!'); return; }
    const res = await fetch('/api/questions');
    questions = await res.json();
    currentIndex = 0;
    answers = {};
    showScreen('quiz-screen');
    renderQuestion();
  }

  function renderQuestion() {
    const q = questions[currentIndex];
    const progress = ((currentIndex + 1) / questions.length) * 100;
    document.getElementById('progress-bar').style.width = progress + '%';
    document.getElementById('question-container').innerHTML = `
      <div class="question-card">
        <div class="question-num">Question ${currentIndex + 1} of ${questions.length}</div>
        <div class="question-text">${q.question}</div>
        <div class="options">
          ${q.options.map(opt => `
            <button class="option ${answers[q._id] === opt ? 'selected' : ''}" onclick="selectAnswer('${q._id}', '${opt}', this)">
              ${opt}
            </button>
          `).join('')}
        </div>
      </div>
    `;
  }

  function selectAnswer(qId, opt, el) {
    answers[qId] = opt;
    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
  }

  function nextQuestion() {
    if (currentIndex < questions.length - 1) { currentIndex++; renderQuestion(); }
    else submitQuiz();
  }

  function prevQuestion() {
    if (currentIndex > 0) { currentIndex--; renderQuestion(); }
  }

  async function submitQuiz() {
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ playerName, answers })
    });
    const data = await res.json();
    document.getElementById('final-score').textContent = `${data.score}/${data.total}`;
    const pct = (data.score / data.total) * 100;
    document.getElementById('result-message').textContent =
      pct >= 80 ? '🌟 Excellent!' : pct >= 50 ? '👍 Good job!' : '📚 Keep practicing!';
    showScreen('result-screen');
    loadLeaderboard();
  }

  async function loadLeaderboard() {
    const res = await fetch('/api/scores');
    const scores = await res.json();
    document.getElementById('leaderboard-list').innerHTML = scores.map((s, i) =>
      `<div class="lb-item"><span>${i+1}. ${s.playerName}</span><span>${s.score}/${s.total}</span></div>`
    ).join('');
  }

  function restartQuiz() { showScreen('start-screen'); }
  function showScreen(id) {
    ['start-screen','quiz-screen','result-screen'].forEach(s =>
      document.getElementById(s).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }
</script>
</body>
</html>
